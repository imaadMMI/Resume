name: Build and Deploy
env:
  CI: false
  GITHUB_USERNAME: "imaadMMI"
  REACT_APP_GITHUB_USERNAME: "imaadMMI"
  REACT_APP_GITHUB_TOKEN: ${{ secrets.REACT_APP_GITHUB_TOKEN }} # This is automatically set by Github Actions
  USE_GITHUB_DATA: "true"
  # MEDIUM_USERNAME: "saadpasta" # Change this to your medium username
on:
  workflow_dispatch:
  push:
    branches:
      - main
  schedule:
    - cron: "0 12 * * 1" # see https://docs.github.com/en/actions/reference/events-that-trigger-workflows#scheduled-events
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v3 
        with:
          persist-credentials: false

      - name: Setup Node.js 🔧
        uses: actions/setup-node@v3.8.1
        with:
          node-version: 20.x # Upgraded from 18.x to support modern project builds

      # Removed the faulty global npm update step entirely to eliminate version mismatches

      - name: Install and Build 🔧 
        run: |
          npm install
          npm run build
          
      - name: Deploy 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          token: ${{ secrets.REACT_APP_GITHUB_TOKEN }} 
          BRANCH: gh-pages 
          FOLDER: build